<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaprila Doces</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header>
        <img src="./imagens/kaprila-doces-logo.png" alt="Logo Kaprila Doces">
    </header>
    <main>
        <h1>Proporção de receitas</h1>
        <div id="container">
            <section id="informacao">
                <h2>Receita original</h2>

                <label for="qtd-de-receitas">Quantidade que rende:</label>
                <input type="number" id="qtd-de-receitas" required>
                <label for="qtd-de-receitas-futuras">Quantidade de receitas que quer caclcular:</label>
                <input type="text" id="qtd-de-receitas-futuras" required>
        
                <div class="produto-quantidade">
                    <div class="ingrediente">
                        <label for="ingrediente1">Ingrediente:</label>
                        <input type="text" id="ingrediente1" required>
                    </div>
                    <div class="peso">
                        <label for="peso1">Peso(g):</label>
                        <input type="number" id="peso1" required>
                    </div>
                </div>
                <div class="produto-quantidade">
                    <label for="ingrediente2">Ingrediente:</label>
                    <input type="text" id="ingrediente2">
                    <label for="peso2">Peso(g):</label>
                    <input type="number" id="peso2">
                </div>
                <div class="produto-quantidade">
                    <label for="ingrediente3">Ingrediente:</label>
                    <input type="text" id="ingrediente3">
                    <label for="peso3">Peso(g):</label>
                    <input type="number" id="peso3">
                </div>
                <div class="produto-quantidade">
                    <label for="ingrediente4">Ingrediente:</label>
                    <input type="text" id="ingrediente4">
                    <label for="peso4">Peso(g):</label>
                    <input type="number" id="peso4">
                </div>
                <div class="produto-quantidade">
                    <label for="ingrediente5">Ingrediente:</label>
                    <input type="text" id="ingrediente5">
                    <label for="peso5">Peso(g):</label>
                    <input type="number" id="peso5">
                </div>
                <div class="produto-quantidade">
                    <label for="ingrediente6">Ingrediente:</label>
                    <input type="text" id="ingrediente6">
                    <label for="peso6">Peso(g):</label>
                    <input type="number" id="peso6">
                </div>
                <button id="calcular">Calcular</button>
            </section>
            <section id="resultados">
                <h2>Resultados</h2>
                <div>
                    <p>Ingrediente:</p>
                    <p>--</p>
                </div>
                <div>
                    <p>Ingrediente:</p>
                    <p>--</p>
                </div>
                <div>
                    <p>Ingrediente:</p>
                    <p>--</p>
                </div>
                <div>
                    <p>Ingrediente:</p>
                    <p>--</p>
                </div>
                <div>
                    <p>Ingrediente:</p>
                    <p>--</p>
                </div>
                <div>
                    <p>Ingrediente:</p>
                    <p>--</p>
                </div>
            </section>
        </div>
    </main>
    <footer>
        <p>Desenvolvido por <a href="https://github.com/kauanyfarias" target="_blank">Kauany Farias.</a></p>
    </footer>


</body>
</html>
